name: Build PLC Runtime Image

on:
  push:
    branches:
      - main
      - testing
    paths:
      - services/plc-runtime/**
      - .github/workflows/build-plc-runtime.yml
  pull_request:
    branches:
      - main
      - testing
    paths:
      - services/plc-runtime/**
      - .github/workflows/build-plc-runtime.yml
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/plc-runtime/Dockerfile
          push: false
          tags: controller-stack/plc-runtime:${{ github.sha }}
