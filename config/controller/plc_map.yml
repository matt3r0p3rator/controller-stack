# ─────────────────────────────────────────────────────────────────────────────
# PLC Bridge — Modbus TCP register mapping
#
# The plc_bridge profile connects the MQTT sensor/output layer to an
# OpenPLC Runtime instance via Modbus TCP.
#
# Register layout (Holding Registers / %QW):
#
#   Zone 0–99   OUTPUT zone
#     The PLC writes results here; the bridge reads them and publishes to MQTT.
#     In your OpenPLC program, assign outputs to %QW0, %QW1, etc.
#
#   Zone 100–199  INPUT zone
#     The bridge writes incoming MQTT sensor values here so the PLC can read
#     them as %QW100, %QW101, etc.
#
# Scaling: raw Modbus registers are uint16 (0–65535).
#   stored_value = float_value * scale   (on write)
#   float_value  = register_value / scale (on read)
#
# ─────────────────────────────────────────────────────────────────────────────

openplc:
  host: openplc          # Docker service name — resolves inside controller-net
  port: 502
  unit_id: 1             # Modbus slave/unit ID (OpenPLC default is 1)
  poll_interval: 0.1     # seconds — 100 ms gives PLC-like responsiveness

# MQTT sensor topics → Holding Registers (INPUT zone, written by bridge)
# The PLC reads these as %QW<register> in its ladder/ST program.
inputs:
  - topic: "mcu/sensor/mcu_0/voltage_0"
    register: 100     # %QW100  — cell voltage
    scale: 100        # store as centivolts (12.05 V → 1205)

  - topic: "mcu/sensor/mcu_0/current_0"
    register: 101     # %QW101  — cell current
    scale: 100        # store as centiamps (9.80 A → 980)

  - topic: "mcu/sensor/mcu_0/temp_0"
    register: 102     # %QW102  — cell temperature
    scale: 10         # store as decidegrees (55.3 °C → 553)

  - topic: "mcu/sensor/mcu_0/temp_1"
    register: 103     # %QW103  — ambient temperature
    scale: 10

# Holding Registers (OUTPUT zone) → MQTT output topics (read by bridge, sent to MCU)
# The PLC writes these as %QW<register> in its ladder/ST program.
outputs:
  - register: 0       # %QW0   — relay control
    topic: "mcu/output/relay_0"
    scale: 1          # 0 = off, 1 = on (integer, no scaling needed)

  - register: 1       # %QW1   — PWM duty cycle
    topic: "mcu/output/pwm_0"
    scale: 1          # 0–255 direct

  - register: 2       # %QW2   — emergency stop flag
    topic: "mcu/output/estop"
    scale: 1          # any non-zero value triggers estop
    trigger_only: true  # only publish when value changes to non-zero
