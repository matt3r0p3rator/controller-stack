events {}

http {
    # Use Docker's internal DNS — resolves container names dynamically at request time
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # WebSocket / long-poll timeouts
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    server {
        listen 80;

        # Grafana
        location /grafana/ {
            set $upstream http://grafana:3000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Node-RED — redirect bare path first
        location = /nodered {
            return 301 $scheme://$http_host/nodered/;
        }

        location /nodered/ {
            set $upstream http://nodered:1880;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_redirect http://nodered:1880/ $scheme://$http_host/nodered/;
        }

        # Controller REST API
        location /api/ {
            set $upstream http://controller:8000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # InfluxDB UI (optional)
        location /influx/ {
            set $upstream http://influxdb:8086;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Default → Grafana
        location = / {
            return 301 $scheme://$http_host/grafana/;
        }
    }
}
